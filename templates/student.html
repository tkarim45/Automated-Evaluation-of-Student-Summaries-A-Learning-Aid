<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Automated Evaluation of Student Summaries: A Learning Aid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar_footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}">
  </head>
  <body>
    <div class="backgroundimg">
      {% include 'navbar.html' %} <!-- This is how we include the navbar.html file -->

      <div class="welcome">
        <h2>Welcome to the Student Page</h2>
        <p>Does your Student or Child have ADHD or not</p>
        <div class="buttons">
          {% set adhd_url = url_for('adhd') %}
          <button class="yes" onclick="navigateToPage('{{ adhd_url }}')">Yes</button>

          <div class="separator"></div>

          {% set quiz_url = url_for('quiz') %}
          <button class="dontknow" onclick="navigateToPage('{{ quiz_url }}')">Dont Know</button>

          <div class="separator"></div>

          {% set notadhd_url = url_for('notadhd') %}
          <button class="no" onclick="navigateToPage('{{ notadhd_url }}')">No</button>
          
        </div>
    </div>
    

    </div>


    {% include 'footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/navbar_footer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/student.js') }}"></script>
  </body>
</html>
