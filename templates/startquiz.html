<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar_footer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/startquiz.css') }}">
  <title>Automated Evaluation of Student Summaries: A Learning Aid</title>
</head>
<body>

    {% include 'navbar.html' %} <!-- This is how we include the navbar.html file -->

    <div class="quiz">
      <h4>Select the Following Options</h4><br>

      <form class="adhdQuizForm" id="adhdQuizForm">
        <h5>Inattention Symptoms</h5><br>

        <label><b>1. Fails to give attention to details or makes careless mistakes in schoolwork, work, or during other 0123 activities (e.g.,overlooks or misses details, work is inaccurate).</b><br><br>
            <input type="radio" name="q1" value="0">Not at all<br>
            <input type="radio" name="q1" value="1">Just a Little<br>
            <input type="radio" name="q1" value="2">Often<br>
            <input type="radio" name="q1" value="3">Very Often<br>
        </label><br>

        <label><b>2. Has difficulty sustaining attention to tasks or play activities (e.g., has difficulty remaining focused during lectures; conversations; or lengthy reading).</b><br><br>
          <input type="radio" name="q2" value="0">Not at all<br>
          <input type="radio" name="q2" value="1">Just a Little<br>
          <input type="radio" name="q2" value="2">Often<br>
          <input type="radio" name="q2" value="3">Very Often<br>
        </label><br>

        <label><b>3. Does not seem to listen when spoken to directly (e.g., mind seems elsewhere, even in the absence of 0123 any obvious distraction).</b><br><br>
          <input type="radio" name="q3" value="0">Not at all<br>
          <input type="radio" name="q3" value="1">Just a Little<br>
          <input type="radio" name="q3" value="2">Often<br>
          <input type="radio" name="q3" value="3">Very Often<br>
        </label><br>

        <label><b>4. Does not follow through on instructions and fails to finish schoolwork, chores, or duties in the workplace (e.g., starts tasks but quickly loses focus and is easily sidetracked.)</b><br><br>
          <input type="radio" name="q4" value="0">Not at all<br>
          <input type="radio" name="q4" value="1">Just a Little<br>
          <input type="radio" name="q4" value="2">Often<br>
          <input type="radio" name="q4" value="3">Very Often<br>
        </label><br>

        <label><b>5. Has difficulty organizing tasks and activities (e.g., difficulty managing sequential tasks; difficulty
          keeping materials and belongings in order; messy, disorganized with work; has poor time management; fails to meet deadlines).</b><br><br>
          <input type="radio" name="q5" value="0">Not at all<br>
          <input type="radio" name="q5" value="1">Just a Little<br>
          <input type="radio" name="q5" value="2">Often<br>
          <input type="radio" name="q5" value="3">Very Often<br>
        </label><br>

        <label><b>6. Avoids, dislikes, or is reluctant to engage in tasks that require sustained mental effort (e.g., schoolwork or homework; for older adolescents and adults, preparing reports, completing forms, reviewing lengthy papers).</b><br><br>
          <input type="radio" name="q6" value="0">Not at all<br>
          <input type="radio" name="q6" value="1">Just a Little<br>
          <input type="radio" name="q6" value="2">Often<br>
          <input type="radio" name="q6" value="3">Very Often<br>
        </label><br>

        <label><b>7. Loses things necessary for tasks or activities (e.g., school materials, pencils, books, tools, wallets, keys, 0123 paperwork, eyeglasses, mobile telephones).</b><br><br>
          <input type="radio" name="q7" value="1">Just a Little<br>
          <input type="radio" name="q7" value="2">Often<br>
          <input type="radio" name="q7" value="3">Very Often<br>
        </label><br>

        <label><b>8. Is easily distracted by extraneous stimuli (for older adolescents and adults, may include unrelated thoughts).</b><br><br>
          <input type="radio" name="q8" value="0">Not at all<br>
          <input type="radio" name="q8" value="1">Just a Little<br>
          <input type="radio" name="q8" value="2">Often<br>
          <input type="radio" name="q8" value="3">Very Often<br>
        </label><br>

        <label><b>9. Is forgetful in daily activities (e.g., doing chores, running errands; for older adolescents and adults, returning calls, paying bills, keeping appointments).</b><br><br>
          <input type="radio" name="q9" value="0">Not at all<br>
          <input type="radio" name="q9" value="1">Just a Little<br>
          <input type="radio" name="q9" value="2">Often<br>
          <input type="radio" name="q9" value="3">Very Often<br>
        </label><br><br>

        <h5>Hyperactive Symptoms</h5><br>

        <label><b>10. Fidgets with or taps hands or feet or squirms in seat</b><br><br>
          <input type="radio" name="q10" value="0">Not at all<br>
          <input type="radio" name="q10" value="1">Just a Little<br>
          <input type="radio" name="q10" value="2">Often<br>
          <input type="radio" name="q10" value="3">Very Often<br>
        </label><br>

        <label><b>11. Leaves seat in situations in which it is inappropriate (NOTE: in adolescents or adults may be limited to feelings of restlessness).</b><br><br>
          <input type="radio" name="q11" value="1">Just a Little<br>
          <input type="radio" name="q11" value="2">Often<br>
          <input type="radio" name="q11" value="3">Very Often<br>
        </label><br>

        <label><b>12. Unable to play or engage in leisure activities quietly</b><br><br>
          <input type="radio" name="q12" value="0">Not at all<br>
          <input type="radio" name="q12" value="1">Just a Little<br>
          <input type="radio" name="q12" value="2">Often<br>
          <input type="radio" name="q12" value="3">Very Often<br>
        </label><br>

        <label><b>13. Has difficulty playing or engaging in leisure activities quietly</b><br><br>
          <input type="radio" name="q13" value="0">Not at all<br>
          <input type="radio" name="q13" value="1">Just a Little<br>
          <input type="radio" name="q13" value="2">Often<br>
          <input type="radio" name="q13" value="3">Very Often<br>
        </label><br>

        <label><b>14. Is “on the go” or acts as if “driven by a motor” (e.g., is unable to be or uncomfortable being still for extended time in restaurants, meetings; may be experienced by others as being restless or difficult to keep up with)</b><br><br>
          <input type="radio" name="q14" value="0">Not at all<br>
          <input type="radio" name="q14" value="1">Just a Little<br>
          <input type="radio" name="q14" value="2">Often<br>
          <input type="radio" name="q14" value="3">Very Often<br>
        </label><br>

        <label><b>15. Talks excessively</b><br><br>
          <input type="radio" name="q15" value="0">Not at all<br>
          <input type="radio" name="q15" value="1">Just a Little<br>
          <input type="radio" name="q15" value="2">Often<br>
          <input type="radio" name="q15" value="3">Very Often<br>
        </label><br><br>

        <h5>Impulsive Symptoms</h5><br>

        <label><b>16. Blurts out answers before questions have been completed (e.g., completes people's sentences; cannot wait for turn in conversation).</b><br><br>
          <input type="radio" name="q16" value="0">Not at all<br>
          <input type="radio" name="q16" value="1">Just a Little<br>
          <input type="radio" name="q16" value="2">Often<br>
          <input type="radio" name="q16" value="3">Very Often<br>
        </label><br>

        <label><b>17. Has difficulty waiting his or her turn (e.g., while waiting in line).</b><br><br>
          <input type="radio" name="q17" value="0">Not at all<br>
          <input type="radio" name="q17" value="1">Just a Little<br>
          <input type="radio" name="q17" value="2">Often<br>
          <input type="radio" name="q17" value="3">Very Often<br>
        </label><br>

        <label><b>18. Interrupts or intrudes on others (eg, butts into conversations, games, or activities; may start using other people's things without asking or receiving permission; for adolescents and adults may intrude into or take over what others are doing)</b><br><br>
          <input type="radio" name="q18" value="0">Not at all<br>
          <input type="radio" name="q18" value="1">Just a Little<br>
          <input type="radio" name="q18" value="2">Often<br>
          <input type="radio" name="q18" value="3">Very Often<br>
        </label><br><br>

        <input type="button" value="Submit" onclick="calculateScore()">
      </form>

      <!-- <div class="result">
        <p id="result"></p>
      </div> -->
    


    </div>
    

    {% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/navbar_footer.js') }}"></script>
<script src="{{ url_for('static', filename='js/startquiz.js') }}"></script>
</body>
</html>
